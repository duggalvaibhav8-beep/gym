name: Deploy PHP with PM2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd /var/www/html/gym
          git fetch origin main
          git reset --hard origin/main

      - name: Restart PM2 app
        run: |
          pm2 restart php-app || pm2 start "php -S 0.0.0.0:8000 -t /var/www/html/gym" --name phppro
